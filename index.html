<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Storyboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <img src="assets/logo.png" alt="A.I Logo" class="logo-img"> Storyboard
            </div>

            <div class="sidebar-section">
                <h3 class="section-title">스타일을 선택해주세요</h3>
                <div class="style-options">
                    <button class="style-btn" data-style="linedrawing">
                        <img src="assets/style_linedrawing.png" alt="라인드로잉">
                        <span class="style-label">라인드로잉</span>
                    </button>
                    <button class="style-btn" data-style="colored">
                        <img src="assets/style_colored.png" alt="채색 라인드로잉">
                        <span class="style-label">채색</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-section generate-section">
                <p class="generate-text">선택한 컷을<br>생성하시겠습니까?</p>
                <button class="generate-btn" id="mainGenerateBtn">GENERATE</button>
                <div class="action-buttons">
                    <button class="action-btn delete-btn" id="deleteSelectedBtn" title="선택한 컷 삭제">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M19 7L18.1327 19.1425C18.0579 20.1891 17.187 21 16.1378 21H7.86224C6.81296 21 5.94208 20.1891 5.86732 19.1425L5 7M10 11V17M14 11V17M15 7V4C15 3.44772 14.5523 3 14 3H10C9.44772 3 9 3.44772 9 4V7M4 7H20"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        선택 삭제
                    </button>
                    <button class="action-btn save-btn" id="saveSelectedBtn" title="생성된 컷 저장">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M4 16V17C4 18.6569 5.34315 20 7 20H17C18.6569 20 20 18.6569 20 17V16M12 4V16M12 16L8 12M12 16L16 12"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        선택 저장
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Alert / Toast Container -->
            <div id="toastContainer" class="toast-container"></div>

            <header class="top-bar">
                <div class="api-key-container">
                    <label for="geminiApiKey">Gemini API Key:</label>
                    <input type="password" id="geminiApiKey" placeholder="Enter API Key here"
                        title="임시 테스트용 API 키 입력창입니다.">
                </div>
            </header>

            <div class="cuts-container" id="cutsContainer">
                <!-- Initial Cut (CUT 1) -->
                <div class="cut-item" data-cut-id="1">
                    <div class="cut-header">CUT <span class="cut-number">1</span></div>
                    <div class="cut-body">
                        <div class="cut-image-wrapper">
                            <label class="cut-checkbox-container">
                                <input type="checkbox" class="cut-checkbox" checked>
                                <span class="checkmark"></span>
                            </label>
                            <div class="image-placeholder">
                                <span class="placeholder-text">Image Area</span>
                                <div class="loader" style="display: none;"></div>
                            </div>
                            <img class="generated-image" style="display: none;" alt="Generated Storyboard">
                            <button class="regenerate-btn" style="display: none;">다시 생성</button>
                        </div>
                        <div class="cut-script-wrapper">
                            <div class="script-header">
                                <span class="script-title">프롬프트 스크립트</span>
                                <button class="clear-script-btn" title="스크립트 모두 지우기">지우기 ↺</button>
                            </div>
                            <div class="script-fields">
                                <div class="script-field">
                                    <label>배경</label>
                                    <input type="text" class="script-input script-bg" placeholder="예: 카페 내부">
                                </div>
                                <div class="script-field">
                                    <label>카메라 구도</label>
                                    <input type="text" class="script-input script-camera"
                                        placeholder="예: 바스트 샷, 45도 각도">
                                </div>
                                <div class="script-field">
                                    <label>분위기</label>
                                    <input type="text" class="script-input script-mood" placeholder="예: 따뜻하고 부드러운">
                                </div>
                                <div class="script-field">
                                    <label>주요 요소</label>
                                    <input type="text" class="script-input script-elements"
                                        placeholder="예: 짧은 머리의 여성, 커피잔">
                                </div>
                                <div class="script-field">
                                    <label>상세 상황</label>
                                    <textarea class="script-textarea script-detail"
                                        placeholder="예: 창밖을 바라보며 커피를 마시고 있다."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="add-cut-wrapper">
                <button class="add-cut-btn" id="addCutBtn" title="새로운 컷 추가">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Cut Template for JS cloning -->
    <template id="cutTemplate">
        <div class="cut-item">
            <div class="cut-header">CUT <span class="cut-number"></span></div>
            <div class="cut-body">
                <div class="cut-image-wrapper">
                    <label class="cut-checkbox-container">
                        <input type="checkbox" class="cut-checkbox" checked>
                        <span class="checkmark"></span>
                    </label>
                    <div class="image-placeholder">
                        <span class="placeholder-text">Image Area</span>
                        <div class="loader" style="display: none;"></div>
                    </div>
                    <img class="generated-image" style="display: none;" alt="Generated Storyboard">
                    <button class="regenerate-btn" style="display: none;">다시 생성</button>
                </div>
                <div class="cut-script-wrapper">
                    <div class="script-header">
                        <span class="script-title">프롬프트 스크립트</span>
                        <button class="clear-script-btn" title="스크립트 모두 지우기">지우기 ↺</button>
                    </div>
                    <div class="script-fields">
                        <div class="script-field">
                            <label>배경</label>
                            <input type="text" class="script-input script-bg" placeholder="예: 카페 내부">
                        </div>
                        <div class="script-field">
                            <label>카메라 구도</label>
                            <input type="text" class="script-input script-camera" placeholder="예: 바스트 샷, 45도 각도">
                        </div>
                        <div class="script-field">
                            <label>분위기</label>
                            <input type="text" class="script-input script-mood" placeholder="예: 따뜻하고 부드러운">
                        </div>
                        <div class="script-field">
                            <label>주요 요소</label>
                            <input type="text" class="script-input script-elements" placeholder="예: 짧은 머리의 여성, 커피잔">
                        </div>
                        <div class="script-field">
                            <label>상세 상황</label>
                            <textarea class="script-textarea script-detail"
                                placeholder="예: 창밖을 바라보며 커피를 마시고 있다."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>

</html>
