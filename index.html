<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>버블 정렬 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="phone" id="app">
    <header class="top-meta">
      <button class="home-btn" aria-label="home menu">
        <span></span><span></span>
      </button>
      <p class="best-record" id="bestRecord">Best Record Stage 0 / 0.0s</p>
    </header>

    <section class="stage-title-wrap">
      <h1 class="stage-title" id="stageTitle">Stage 1</h1>
    </section>

    <section class="score-row">
      <div class="time-left" id="timeLeft">10.0s</div>
      <div class="combo-badge hidden" id="comboBadge">1 Combo</div>
    </section>

    <section class="timer-row">
      <div class="clock-icon">
        <div class="clock-hand" id="clockHand"></div>
      </div>
      <div class="timer-track">
        <div class="timer-fill" id="timerFill"></div>
      </div>
    </section>

    <main class="board-area">
      <div class="board-wrap" id="boardWrap">
        <div class="board" id="board"></div>
        <div class="floating-layer" id="floatingLayer"></div>
      </div>
    </main>

    <footer class="hint-bar" id="hintBar"></footer>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="overlay-card">
        <h2>Game Over</h2>
        <p id="gameOverText">다시 도전해보세요!</p>
        <button id="restartBtn">다시 시작</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
